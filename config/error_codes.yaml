IXBRL-0007:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §5.1"
  desc: "ix:fraction with invalid numerator or denominator"
  fix: "Ensure ix:fraction contains valid ix:numerator and ix:denominator children"

IXBRL-0008:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §8"
  desc: "Invalid ix:tuple element"
  fix: "Ensure ix:tuple has a valid name attribute and well-formed child facts"

IXBRL-0009:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §9"
  desc: "ix:continuation element with invalid target"
  fix: "Ensure the continuationAt attribute references a valid ix:continuation id"

IXBRL-0010:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §10"
  desc: "ix:exclude element in invalid position"
  fix: "Ensure ix:exclude is only used within ix:nonNumeric or ix:footnote elements"

IXBRL-0011:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §11"
  desc: "Duplicate target document"
  fix: "Ensure each target attribute value is unique across the document set"

IXBRL-0012:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §4"
  desc: "Multiple ix:header elements found"
  fix: "Ensure there is exactly one ix:header element in the document"

IXBRL-0013:
  severity: warning
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §5"
  desc: "Nested ix:nonFraction elements"
  fix: "Avoid nesting ix:nonFraction elements unless required by the specification"

IXBRL-0014:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §12"
  desc: "ix:footnote element with invalid content"
  fix: "Ensure ix:footnote contains valid XHTML content"

IXBRL-0015:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §4"
  desc: "Hidden element in ix:header is not allowed for this content type"
  fix: "Move visible facts outside of the ix:hidden element"

IXBRL-0016:
  severity: warning
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §5"
  desc: "Scale attribute potentially incorrect"
  fix: "Verify the scale attribute matches the intended magnitude of the reported value"

IXBRL-0017:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §5"
  desc: "Sign attribute invalid"
  fix: "Ensure the sign attribute is either absent or set to '-'"

IXBRL-0018:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §7"
  desc: "Unknown transformation registry"
  fix: "Ensure the format attribute uses a registered transformation namespace"

IXBRL-0019:
  severity: warning
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §4"
  desc: "Empty inline fact element"
  fix: "Add content to the inline fact or mark it as nil"

IXBRL-0020:
  severity: error
  source: inline_xbrl
  spec: "XHTML 1.0"
  desc: "Invalid XHTML in inline document"
  fix: "Ensure the document is valid XHTML and all elements are properly nested"

