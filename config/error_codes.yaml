  desc: "Formula expression evaluation error"
  fix: "Check the XPath expression for syntax errors and valid variable references"

FORMULA-0002:
  severity: error
  source: formula
  spec: "XBRL Formula 1.0 §3"
  desc: "Assertion evaluation failure"
