  desc: "Conflicting context definitions across documents"
  fix: "Ensure context elements with the same id have identical content across all documents"

MERGE-0002:
  severity: error
  source: merger
  spec: "Inline XBRL 1.1 §11"
  desc: "Conflicting unit definitions across documents"
  fix: "Ensure unit elements with the same id have identical content across all documents"

MERGE-0003:
  severity: error
  source: merger
  spec: "Inline XBRL 1.1 §11"
  desc: "Duplicate fact id across documents"
  fix: "Ensure fact element ids are unique across all documents in the filing"

MERGE-0004:
  severity: warning
