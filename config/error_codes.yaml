# =============================================================================
# XBRL Validator – Error Code Registry
#
# Every validation finding is identified by a unique code in the format
# CATEGORY-NNNN.  The registry below maps each code to its metadata:
#
#   severity : error | warning | inconsistency | info
#   source   : subsystem that emits the finding
#   spec     : specification section that defines the rule
#   desc     : short human-readable description
#   fix      : suggested remediation
# =============================================================================

# ---------------------------------------------------------------------------
# PARSE – XML / document parsing errors
# ---------------------------------------------------------------------------
PARSE-0001:
  severity: error
  source: parser
  spec: "XML 1.0"
  desc: "Malformed XML"
  fix: "Check XML well-formedness - ensure all tags are properly closed and nested"

PARSE-0002:
  severity: error
  source: parser
  spec: "XML 1.0 §4.2.2"
  desc: "External entity detected (XXE)"
  fix: "Remove external entity references from the document"

PARSE-0003:
  severity: error
  source: parser
  spec: "XML 1.0"
  desc: "DTD bomb / entity expansion attack detected"
  fix: "Remove recursive entity definitions from the document"

PARSE-0004:
  severity: error
  source: parser
  spec: "XML 1.0"
  desc: "Invalid character encoding"
  fix: "Ensure the document uses a supported encoding (UTF-8 recommended)"

PARSE-0005:
  severity: error
  source: parser
  spec: "XML Namespaces 1.0"
  desc: "Namespace declaration error"
  fix: "Verify all namespace prefixes are properly declared"

PARSE-0006:
  severity: error
  source: parser
  spec: "XBRL 2.1 §3"
  desc: "File exceeds maximum allowed size"
  fix: "Split the filing into smaller instance documents or increase the max file size configuration"

PARSE-0007:
  severity: error
  source: parser
  spec: "XBRL 2.1 §3"
  desc: "Unsupported XBRL format"
  fix: "Ensure the document is in a supported format (XBRL XML, iXBRL, xBRL-JSON, xBRL-CSV)"

# ---------------------------------------------------------------------------
# DTS – Discoverable Taxonomy Set resolution
# ---------------------------------------------------------------------------
DTS-0001:
  severity: error
  source: taxonomy
  spec: "XBRL 2.1 §3.2"
  desc: "Taxonomy schema not found"
  fix: "Verify the schemaRef href points to a valid taxonomy schema URL or file"

DTS-0002:
  severity: error
  source: taxonomy
  spec: "XBRL 2.1 §3.5"
  desc: "Linkbase reference cannot be resolved"
  fix: "Check that the linkbaseRef href is correct and the linkbase file is accessible"

DTS-0003:
  severity: error
  source: taxonomy
  spec: "XBRL 2.1 §3.4"
  desc: "Circular import detected in taxonomy"
  fix: "Remove the circular schema import chain"

DTS-0004:
  severity: warning
  source: taxonomy
  spec: "XBRL 2.1 §3.5.3"
  desc: "Duplicate linkbase reference"
  fix: "Remove the duplicate linkbaseRef element"

DTS-0005:
  severity: error
  source: taxonomy
  spec: "XBRL 2.1 §3.2"
  desc: "Taxonomy fetch timeout"
  fix: "Check network connectivity or increase the taxonomy_fetch_timeout_s configuration"

# ---------------------------------------------------------------------------
# MODEL – XBRL data model construction
# ---------------------------------------------------------------------------
MODEL-0001:
  severity: error
  source: model
  spec: "XBRL 2.1 §4"
  desc: "Duplicate fact identifier"
  fix: "Ensure all fact elements have unique id attributes within the instance"

MODEL-0002:
  severity: error
  source: model
  spec: "XBRL 2.1 §4.7"
  desc: "Context references undefined context"
  fix: "Add a context element with the referenced id to the instance document"

MODEL-0003:
  severity: error
  source: model
  spec: "XBRL 2.1 §4.8"
  desc: "Unit references undefined unit"
  fix: "Add a unit element with the referenced id to the instance document"

MODEL-0004:
  severity: error
  source: model
  spec: "XBRL 2.1 §4"
  desc: "Fact references undefined concept in DTS"
  fix: "Ensure the concept is declared in an imported taxonomy schema"

MODEL-0005:
  severity: warning
  source: model
  spec: "XBRL 2.1 §4"
  desc: "Unused context or unit definition"
  fix: "Remove context/unit elements that are not referenced by any fact"

# ---------------------------------------------------------------------------
# XBRL21 – XBRL 2.1 specification rules
# ---------------------------------------------------------------------------
XBRL21-0001:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.1"
  desc: "Missing required xbrli:xbrl root element"
  fix: "Ensure the root element is xbrli:xbrl with the correct namespace"

XBRL21-0002:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.2"
  desc: "Missing required schemaRef element"
  fix: "Add at least one link:schemaRef element to the instance document"

XBRL21-0003:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.7.1"
  desc: "Invalid instant period"
  fix: "Ensure the instant element contains a valid date value"

XBRL21-0004:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.7.2"
  desc: "Invalid duration period - start date must precede end date"
  fix: "Ensure startDate is before endDate in the period element"

XBRL21-0005:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.7"
  desc: "Missing period element in context"
  fix: "Add a period element to the context"

XBRL21-0006:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.6"
  desc: "Invalid entity identifier"
  fix: "Ensure the entity identifier scheme and value are present and valid"

XBRL21-0007:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.8"
  desc: "Invalid unit - missing required measure"
  fix: "Add at least one measure element to the unit"

XBRL21-0008:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.8.2"
  desc: "Invalid divide element in unit"
  fix: "Ensure divide contains both unitNumerator and unitDenominator"

XBRL21-0009:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.6.2"
  desc: "Numeric fact missing unitRef"
  fix: "Add a unitRef attribute to the numeric fact element"

XBRL21-0010:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.6.3"
  desc: "Non-numeric fact has unitRef"
  fix: "Remove the unitRef attribute from the non-numeric fact element"

XBRL21-0011:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.6.5"
  desc: "Invalid precision/decimals specification"
  fix: "Use either precision or decimals, not both; ensure the value is valid"

XBRL21-0012:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.6.6"
  desc: "Both precision and decimals specified on fact"
  fix: "Remove either precision or decimals - only one may be specified"

XBRL21-0013:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.6"
  desc: "Fact value does not match concept data type"
  fix: "Ensure the fact value conforms to the data type declared in the taxonomy"

XBRL21-0014:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.7"
  desc: "Duplicate context definition"
  fix: "Remove duplicate context elements with equivalent content"

XBRL21-0015:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.8"
  desc: "Duplicate unit definition"
  fix: "Remove duplicate unit elements with equivalent content"

XBRL21-0016:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.9"
  desc: "Invalid footnote link"
  fix: "Ensure footnoteLink elements use the correct arcrole and XLink attributes"

XBRL21-0017:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §5.2.5"
  desc: "Concept not in abstract substitution group used as abstract"
  fix: "Set the abstract attribute correctly in the taxonomy schema"

XBRL21-0018:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §5.1"
  desc: "Element declaration missing required attributes"
  fix: "Add required attributes (name, type, substitutionGroup) to the element declaration"

XBRL21-0019:
  severity: warning
  source: spec_validator
  spec: "XBRL 2.1 §4.6.7"
  desc: "Nil fact with non-empty content"
  fix: "Remove content from the fact element or remove the xsi:nil attribute"

XBRL21-0020:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.7.3"
  desc: "Context segment contains invalid content"
  fix: "Ensure context segment only contains valid elements"

XBRL21-0021:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §4.7.4"
  desc: "Context scenario contains invalid content"
  fix: "Ensure context scenario only contains valid elements"

XBRL21-0022:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §5.2.1"
  desc: "Extended link with invalid content"
  fix: "Ensure extended link elements only contain valid arc, locator, and resource elements"

XBRL21-0023:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §5.2.3"
  desc: "Arc with missing or invalid from/to locators"
  fix: "Ensure arc from/to attributes reference valid locator labels"

XBRL21-0024:
  severity: error
  source: spec_validator
  spec: "XBRL 2.1 §5.2.4"
  desc: "Locator with unresolvable href"
  fix: "Ensure locator href points to a valid resource in the DTS"

XBRL21-0025:
  severity: warning
  source: spec_validator
  spec: "XBRL 2.1 §3.5.3"
  desc: "Duplicate role or arcrole definition"
  fix: "Remove the duplicate role/arcrole definition"

# ---------------------------------------------------------------------------
# CALC – Calculation linkbase validation
# ---------------------------------------------------------------------------
CALC-0001:
  severity: inconsistency
  source: calculation
  spec: "XBRL 2.1 §5.2.5.2"
  desc: "Calculation inconsistency - summation item total mismatch"
  fix: "Review the reported facts and verify the values are correct"

CALC-0002:
  severity: warning
  source: calculation
  spec: "XBRL 2.1 §5.2.5.2"
  desc: "Missing contributing item in calculation"
  fix: "Report the missing contributing fact or verify it should be omitted"

CALC-0003:
  severity: error
  source: calculation
  spec: "XBRL 2.1 §5.2.5.2"
  desc: "Invalid weight on calculation arc"
  fix: "Ensure the calculation arc weight is a valid non-zero decimal value"

CALC-0004:
  severity: warning
  source: calculation
  spec: "XBRL 2.1 §5.2.5.2"
  desc: "Calculation rollup rounding tolerance exceeded"
  fix: "Review the rounding of contributing fact values"

CALC-0005:
  severity: warning
  source: calculation
  spec: "XBRL 2.1 §5.2.5.2"
  desc: "Duplicate calculation relationships"
  fix: "Remove duplicate calculation arcs between the same concepts"

CALC-0006:
  severity: error
  source: calculation
  spec: "XBRL 2.1 §5.2.5.2"
  desc: "Circular calculation relationship detected"
  fix: "Remove the circular dependency in the calculation linkbase"

# ---------------------------------------------------------------------------
# DIM – Dimensional (XBRL Dimensions 1.0) validation
# ---------------------------------------------------------------------------
DIM-0001:
  severity: error
  source: dimensions
  spec: "XBRL Dimensions 1.0 §2.4"
  desc: "Invalid explicit dimension member"
  fix: "Ensure the dimension member is a valid domain member for the declared dimension"

DIM-0002:
  severity: error
  source: dimensions
  spec: "XBRL Dimensions 1.0 §2.5"
  desc: "Invalid typed dimension value"
  fix: "Ensure the typed dimension value conforms to the declared element type"

DIM-0003:
  severity: error
  source: dimensions
  spec: "XBRL Dimensions 1.0 §2.3"
  desc: "Hypercube not valid for primary item"
  fix: "Verify the primary item is associated with the correct hypercube via definition linkbase"

DIM-0004:
  severity: error
  source: dimensions
  spec: "XBRL Dimensions 1.0 §2.6"
  desc: "Required dimension missing from context"
  fix: "Add the required dimension member to the context segment or scenario"

DIM-0005:
  severity: error
  source: dimensions
  spec: "XBRL Dimensions 1.0 §2.6"
  desc: "Unexpected dimension in context"
  fix: "Remove the dimension that is not declared in the relevant hypercube"

DIM-0006:
  severity: error
  source: dimensions
  spec: "XBRL Dimensions 1.0 §2.4"
  desc: "Default member explicitly reported"
  fix: "Remove the default dimension member from the context - it is implied"

DIM-0007:
  severity: error
  source: dimensions
  spec: "XBRL Dimensions 1.0 §2.3"
  desc: "Negative hypercube (notAll) violation"
  fix: "Ensure the fact's dimensional context does not match an excluded hypercube"

DIM-0008:
  severity: error
  source: dimensions
  spec: "XBRL Dimensions 1.0 §2.3"
  desc: "Duplicate hypercube-dimension relationship"
  fix: "Remove the duplicate hypercube-dimension arc in the definition linkbase"

DIM-0009:
  severity: error
  source: dimensions
  spec: "XBRL Dimensions 1.0 §2.4"
  desc: "Dimension domain not found"
  fix: "Ensure the dimension-domain arc correctly references a valid domain element"

DIM-0010:
  severity: warning
  source: dimensions
  spec: "XBRL Dimensions 1.0 §2.4"
  desc: "Dimension has no default member declared"
  fix: "Consider adding a dimension-default arc for the dimension"

# ---------------------------------------------------------------------------
