IXBRL-0003:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §6"
  desc: "Invalid ix:nonNumeric element"
  fix: "Ensure ix:nonNumeric has required attributes (name, contextRef)"

IXBRL-0004:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §7"
  desc: "Transformation failure"
  fix: "Check that the format attribute matches a valid transformation rule for the value"

IXBRL-0005:
  severity: error
  source: inline_xbrl
  spec: "Inline XBRL 1.1 §4.2"
  desc: "Invalid ix:references element"
  fix: "Ensure ix:references contains valid schemaRef elements"

IXBRL-0006:
