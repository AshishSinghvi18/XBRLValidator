FORMULA-0003:
  severity: error
  source: formula
  spec: "XBRL Formula 1.0 §2.3"
  desc: "Variable binding error - unresolvable variable"
  fix: "Ensure all variable references can be resolved in the variable set"

FORMULA-0004:
  severity: error
  source: formula
  spec: "XBRL Formula 1.0 §2.4"
  desc: "Filter evaluation error"
  fix: "Check the filter expression for valid XPath syntax and references"

FORMULA-0005:
  severity: error
  source: formula
  spec: "XBRL Formula 1.0 §4"
  desc: "Consistency assertion failure"
  fix: "Review the consistency assertion and ensure the related facts are correct"

FORMULA-0006:
  severity: warning
  source: formula
  spec: "XBRL Formula 1.0 §2"
  desc: "Formula produces no output"
  fix: "Verify that the formula's variable bindings match at least one fact"

